<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Health Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
    .person-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .person-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd;
      background: white; cursor: pointer; font-size: 13px; }
    .person-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
    .chat { background: white; border-radius: 12px; padding: 1rem;
      min-height: 400px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 85%; }
    .user { background: #1a73e8; color: white; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
    .agent { background: #f1f3f4; color: #202124; align-self: flex-start; border-radius: 12px 12px 12px 4px; }
    .input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid #ddd; font-size: 14px; }
    button.send { padding: 10px 20px; border-radius: 24px; background: #1a73e8;
      color: white; border: none; cursor: pointer; font-size: 14px; }
    .quick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .qbtn { padding: 5px 12px; border-radius: 16px; border: 1px solid #ddd;
      background: white; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
<div class="app">
  <h1>Family Health Agent</h1>
  <div class="person-row">
    <button class="person-btn active" onclick="setPerson('Father',this)">Father</button>
    <button class="person-btn" onclick="setPerson('Mother',this)">Mother</button>
  </div>
  <div class="quick">
    <button class="qbtn" onclick="ask('What medicines is ' + person + ' taking?')">Current medicines</button>
    <button class="qbtn" onclick="ask('Last test results for ' + person)">Last test</button>
    <button class="qbtn" onclick="ask('Upcoming follow-ups for ' + person)">Follow-ups</button>
    <button class="qbtn" onclick="ask('Give me a full health summary for ' + person)">Full summary</button>
  </div>
  <div class="chat" id="chat">
    <div class="msg agent">Hello! Ask me anything about your family's health records.</div>
  </div>
  <div class="input-row">
    <input id="inp" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send" onclick="sendMsg()">Send</button>
  </div>
</div>
  
  <script>
    const AGENT_URL = 'https://script.google.com/macros/s/AKfycbytGW9kn5Ha0XwkOHehMaKMDFqol0GqQRPT3LuT7eVYD-ohfbUuXeychXdjdJLjaWk/exec';
  let person = 'Father';

  function setPerson(p, btn) {
    person = p;
    document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function inferColumnLabels(rows, maxCols) {
    const flat = rows.flat().join(' ').toLowerCase();
    if (flat.includes('mg') || flat.includes('tablet') || flat.includes('daily') || flat.includes('twice') || flat.includes('once')) {
      return ['Medicine & dose','Frequency','Doctor','Condition','Notes'].slice(0, maxCols);
    }
    if (flat.includes('hba1c') || flat.includes('cbc') || flat.includes('normal') || flat.includes('high') || flat.includes('low') || flat.includes('%')) {
      return ['Test','Date','Result','Status','Lab'].slice(0, maxCols);
    }
    if (flat.includes('dr.') || flat.includes('clinic') || flat.includes('visit') || flat.includes('apollo')) {
      return ['Date','Doctor','Clinic','Reason','Follow-up'].slice(0, maxCols);
    }
    return ['Details','Value','Info','Notes','Status'].slice(0, maxCols);
  }

  function renderResponse(text) {
  if (!text) return '<div style="color:#202124;font-size:14px">No response received.</div>';

  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  // Check if response has sections with items under them
  const hasSections = lines.some(l => /^[A-Z][^|]+:$/.test(l) || /medications:|medicines:|health:|psychiatric:|general:|conditions:|tests:|visits:/i.test(l));
  const hasNumbered = lines.some(l => /^\d+\./.test(l));
  const hasItems = lines.some(l => /^[-–—]/.test(l));

  // CASE 1 — has sections with bullet items → render as headed numbered groups
  if (hasSections && hasItems) {
    let html = '';
    let currentSection = null;
    let itemNum = 0;
    let summaryLine = '';

    lines.forEach(line => {
      // Detect summary line
      if (/^summary:/i.test(line) || /^all these/i.test(line) || /^all medications/i.test(line)) {
        summaryLine = line;
        return;
      }

      // Detect section heading — line ending with : or bold heading
      const isHeading = /^[A-Z][^|]{3,}:$/.test(line) ||
                        /^\*\*[^*]+\*\*:?$/.test(line) ||
                        /^(Psychiatric|General|Mental|Diabetes|Thyroid|Kidney|Heart|BP|Cardiac|Vitamin|Supplement)/i.test(line);

      if (isHeading) {
        // Close previous section if open
        if (currentSection !== null) {
          html += `</div>`;
        }
        // Clean the heading text
        const headingText = line.replace(/\*\*/g, '').replace(/:$/, '').trim();
        itemNum = 0; // reset counter for each section
        currentSection = headingText;
        html += `
          <div style="margin-bottom:16px">
            <div style="font-size:13px;font-weight:600;color:#1a73e8;margin-bottom:8px;padding:6px 12px;background:#e8f0fe;border-radius:6px;display:inline-block">
              ${headingText}
            </div>
            <div style="margin-left:4px">`;
        return;
      }

      // Detect bullet item
      const isBullet = /^[-–—*]\s/.test(line);
      if (isBullet && currentSection !== null) {
        itemNum++;
        const itemText = line.replace(/^[-–—*]\s+/, '').trim();

        // Split on first dash that separates name from details
        const dashIdx = itemText.indexOf(' - ');
        const medName = dashIdx > -1 ? itemText.substring(0, dashIdx).trim() : itemText;
        const medDetail = dashIdx > -1 ? itemText.substring(dashIdx + 3).trim() : '';

        html += `
          <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 10px;margin-bottom:6px;background:#f8f9fa;border-radius:8px;border-left:3px solid #e8eaed">
            <div style="background:#1a73e8;color:white;border-radius:50%;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px">${itemNum}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500;color:#202124">${medName}</div>
              ${medDetail ? `<div style="font-size:12px;color:#5f6368;margin-top:2px">${medDetail}</div>` : ''}
            </div>
          </div>`;
        return;
      }

      // Line outside a section — render as plain text
      if (currentSection === null && line) {
        html += `<div style="font-size:14px;color:#202124;margin-bottom:6px">${line}</div>`;
      }
    });

    // Close last section
    if (currentSection !== null) {
      html += `</div></div>`;
    }

    // Summary line at bottom
    if (summaryLine) {
      html += `<div style="margin-top:8px;padding:10px 14px;background:#e8f0fe;border-radius:8px;font-size:12px;color:#1a73e8;font-weight:500">${summaryLine.replace(/\*\*/g,'')}</div>`;
    }

    return html || renderPlain(lines);
  }

  // CASE 2 — numbered lines with | pipes → render as spaced cards
  const numbered = lines.filter(l => /^\d+\./.test(l));
  const summaryLine = lines.find(l => /^summary:/i.test(l));
  const firstNum = numbered.length ? lines.indexOf(numbered[0]) : -1;
  const header = firstNum > 0 ? lines.slice(0, firstNum).join(' ') : '';

  if (numbered.length >= 1) {
    let html = '';
    if (header) {
      html += `<div style="font-size:14px;font-weight:500;color:#202124;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e8eaed">${header}</div>`;
    }
    numbered.forEach((line, idx) => {
      const withoutNum = line.replace(/^\d+\.\s*/, '');
      const parts = withoutNum.split('|').map(p => p.trim()).filter(p => p);
      const mainName = parts[0] || '';
      const rest = parts.slice(1);
      html += `
        <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin-bottom:8px;background:#f8f9fa;border-radius:10px;border-left:3px solid #1a73e8">
          <div style="background:#1a73e8;color:white;border-radius:50%;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px">${idx + 1}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500;color:#202124;margin-bottom:${rest.length ? '4px' : '0'}">${mainName}</div>
            ${rest.map(r => `<div style="font-size:12px;color:#5f6368;margin-bottom:2px">${r}</div>`).join('')}
          </div>
        </div>`;
    });
    if (summaryLine) {
      html += `<div style="margin-top:10px;padding:10px 14px;background:#e8f0fe;border-radius:8px;font-size:12px;color:#1a73e8;font-weight:500">${summaryLine}</div>`;
    }
    return html;
  }

  // CASE 3 — labeled card (Test: HbA1c style)
  const labeled = lines.filter(l => /^[A-Za-z ]+:\s*.+/.test(l) && !/^summary:/i.test(l));
  if (labeled.length >= 2) {
    const firstLbl = lines.indexOf(labeled[0]);
    const hdr = firstLbl > 0 ? lines.slice(0, firstLbl).join(' ') : '';
    let html = '';
    if (hdr) html += `<div style="font-size:14px;font-weight:500;color:#202124;margin-bottom:12px">${hdr}</div>`;
    html += `<div style="background:#f8f9fa;border-radius:10px;padding:4px 0;border:1px solid #e8eaed">`;
    labeled.forEach((line, i) => {
      const ci = line.indexOf(':');
      const lbl = line.substring(0, ci).trim();
      const val = line.substring(ci + 1).trim();
      html += `<div style="display:flex;gap:12px;padding:10px 14px;${i < labeled.length - 1 ? 'border-bottom:1px solid #e8eaed;' : ''}align-items:baseline">
        <div style="font-size:11px;font-weight:500;color:#80868b;min-width:110px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em">${lbl}</div>
        <div style="font-size:13px;color:#202124;flex:1">${val}</div>
      </div>`;
    });
    html += `</div>`;
    const sl = lines.find(l => /^summary:/i.test(l));
    if (sl) html += `<div style="margin-top:10px;padding:10px 14px;background:#e8f0fe;border-radius:8px;font-size:12px;color:#1a73e8;font-weight:500">${sl}</div>`;
    return html;
  }

  // CASE 4 — plain text fallback
  return renderPlain(lines);
}

function renderPlain(lines) {
  return `<div style="font-size:14px;color:#202124;line-height:1.8">${lines.map(l => `<div style="margin-bottom:6px">${l.replace(/\*\*/g,'')}</div>`).join('')}</div>`;
}

  function addMsg(role, text, isHtml) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    if (role === 'user') {
      div.className = 'msg user';
      div.textContent = text;
    } else {
      div.style.cssText = 'align-self:flex-start;width:100%;max-width:100%;background:#f1f3f4;border-radius:4px 12px 12px 12px;padding:12px 14px;font-size:14px';
      if (isHtml) div.innerHTML = text;
      else div.textContent = text;
    }
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
    return div;
  }

  async function ask(q) {
    document.getElementById('inp').value = q;
    await sendMsg();
  }

  async function sendMsg() {
    const inp = document.getElementById('inp');
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    addMsg('user', q);
    const thinking = addMsg('agent', 'Thinking...');
    try {
      const r = await fetch(AGENT_URL, {
        method: 'POST',
        body: JSON.stringify({ question: q, person })
      });
      const data = await r.json();
      const rendered = renderResponse(data.answer);
      thinking.style.cssText = 'align-self:flex-start;width:100%;max-width:100%;background:#f1f3f4;border-radius:4px 12px 12px 12px;padding:12px 14px';
      thinking.innerHTML = rendered;
    } catch(e) {
      thinking.textContent = 'Error connecting. Check your setup.';
    }
  }
</script>
</body>
</html>
