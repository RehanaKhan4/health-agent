<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Health Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #34495e;
    }

    .med {
      margin-left: 10px;
      margin-bottom: 6px;
    }

    .input-box {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 16px;
      border: none;
      background: #2ecc71;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #27ae60;
    }

    .loading {
      text-align: center;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>👨‍⚕️ Health Assistant</h1>

  <div id="response"></div>

  <div class="input-box">
    <input id="question" placeholder="Ask about medicines..." />
    <button onclick="ask()">Ask</button>
  </div>
</div>

<script>
const API_URL = "YOUR_WEB_APP_URL"; // 🔥 paste your Apps Script URL

function formatResponse(text) {
  const sections = text.split("##");
  let html = "";

  sections.forEach(sec => {
    if (!sec.trim()) return;

    const lines = sec.trim().split("\n");
    const title = lines[0];
    const items = lines.slice(1);

    html += `<div class="card">`;
    html += `<div class="section-title">${title}</div>`;

    items.forEach(item => {
      if (item.trim()) {
        html += `<div class="med">${item}</div>`;
      }
    });

    html += `</div>`;
  });

  return html;
}

async function ask() {
  const q = document.getElementById("question").value;

  document.getElementById("response").innerHTML =
    `<div class="loading">⏳ Thinking...</div>`;

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ question: q }),
  });

  const data = await res.json();

  const formatted = formatResponse(data.answer);

  document.getElementById("response").innerHTML = formatted;
}
</script>

</body>
</html>
