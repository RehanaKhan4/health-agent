<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Health Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
    .person-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .person-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd;
      background: white; cursor: pointer; font-size: 13px; }
    .person-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
    .chat { background: white; border-radius: 12px; padding: 1rem;
      min-height: 400px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 85%; }
    .user { background: #1a73e8; color: white; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
    .agent { background: #f1f3f4; color: #202124; align-self: flex-start; border-radius: 12px 12px 12px 4px; }
    .input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border-radius: 24px; border: 1px solid #ddd; font-size: 14px; }
    button.send { padding: 10px 20px; border-radius: 24px; background: #1a73e8;
      color: white; border: none; cursor: pointer; font-size: 14px; }
    .quick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .qbtn { padding: 5px 12px; border-radius: 16px; border: 1px solid #ddd;
      background: white; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
<div class="app">
  <h1>Family Health Agent</h1>
  <div class="person-row">
    <button class="person-btn active" onclick="setPerson('Father',this)">Father</button>
    <button class="person-btn" onclick="setPerson('Mother',this)">Mother</button>
  </div>
  <div class="quick">
    <button class="qbtn" onclick="ask('What medicines is ' + person + ' taking?')">Current medicines</button>
    <button class="qbtn" onclick="ask('Last test results for ' + person)">Last test</button>
    <button class="qbtn" onclick="ask('Upcoming follow-ups for ' + person)">Follow-ups</button>
    <button class="qbtn" onclick="ask('Give me a full health summary for ' + person)">Full summary</button>
  </div>
  <div class="chat" id="chat">
    <div class="msg agent">Hello! Ask me anything about your family's health records.</div>
  </div>
  <div class="input-row">
    <input id="inp" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send" onclick="sendMsg()">Send</button>
  </div>
</div>
<script>
  const AGENT_URL = 'https://script.google.com/macros/s/AKfycbytGW9kn5Ha0XwkOHehMaKMDFqol0GqQRPT3LuT7eVYD-ohfbUuXeychXdjdJLjaWk/exec';
  let person = 'Father';

  function renderResponse(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  // Find numbered lines like "1. Metformin | Twice daily | Dr. Sharma"
  const numbered = lines.filter(l => /^\d+\./.test(l));

  // Find labeled lines like "Test: HbA1c" or "Date: 15 Apr 2026"
  const labeled = lines.filter(l => /^[A-Za-z ]+:/.test(l) && !l.startsWith('Summary'));

  // Find summary line
  const summaryLine = lines.find(l => l.startsWith('Summary:'));

  // Find header line — first line before any numbered or labeled content
  const firstSpecial = Math.min(
    numbered.length ? lines.indexOf(numbered[0]) : 999,
    labeled.length ? lines.indexOf(labeled[0]) : 999
  );
  const header = firstSpecial > 0 ? lines.slice(0, firstSpecial).join(' ') : '';

  // Case 1 — numbered list with pipe separators → render as table
  if (numbered.length >= 1) {
    const rows = numbered.map(line => {
      const withoutNum = line.replace(/^\d+\.\s*/, '');
      return withoutNum.split('|').map(p => p.trim()).filter(p => p);
    });
    const maxCols = Math.max(...rows.map(r => r.length));

    let html = '';
    if (header) {
      html += `<div style="font-size:13px;font-weight:500;color:#202124;margin-bottom:8px">${header}</div>`;
    }

    html += `<div style="overflow-x:auto">`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:12px;min-width:300px">`;
    html += `<thead><tr>`;
    html += `<th style="background:#1a73e8;color:white;padding:7px 10px;text-align:center;width:30px;border-radius:6px 0 0 0">#</th>`;
    const colLabels = inferColumnLabels(rows, maxCols);
    colLabels.forEach((label, i) => {
      const radius = i === colLabels.length - 1 ? 'border-radius:0 6px 0 0' : '';
      html += `<th style="background:#1a73e8;color:white;padding:7px 10px;text-align:left;${radius}">${label}</th>`;
    });
    html += `</tr></thead><tbody>`;

    rows.forEach((row, i) => {
      const bg = i % 2 === 0 ? '#ffffff' : '#f8f9fa';
      html += `<tr style="background:${bg}">`;
      html += `<td style="padding:7px 10px;color:#1a73e8;font-weight:500;text-align:center;border-bottom:1px solid #e8eaed">${i + 1}</td>`;
      for (let c = 0; c < maxCols; c++) {
        html += `<td style="padding:7px 10px;border-bottom:1px solid #e8eaed;color:#202124">${row[c] || ''}</td>`;
      }
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;

    if (summaryLine) {
      html += `<div style="font-size:12px;color:#5f6368;margin-top:8px;padding-top:8px;border-top:1px solid #e8eaed;font-style:italic">${summaryLine}</div>`;
    }
    return html;
  }

  // Case 2 — labeled card like "Test: HbA1c / Date: 15 Apr"
  if (labeled.length >= 2) {
    let html = '';
    if (header) {
      html += `<div style="font-size:13px;font-weight:500;color:#202124;margin-bottom:10px">${header}</div>`;
    }
    html += `<div style="background:#f8f9fa;border-radius:10px;padding:10px 12px;border:1px solid #e8eaed">`;
    labeled.forEach(line => {
      const colonIdx = line.indexOf(':');
      const label = line.substring(0, colonIdx).trim();
      const value = line.substring(colonIdx + 1).trim();
      html += `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #eeeeee;align-items:baseline">`;
      html += `<div style="font-size:11px;font-weight:500;color:#5f6368;min-width:100px;flex-shrink:0">${label}</div>`;
      html += `<div style="font-size:13px;color:#202124">${value}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
    if (summaryLine) {
      html += `<div style="font-size:12px;color:#5f6368;margin-top:8px;font-style:italic">${summaryLine}</div>`;
    }
    return html;
  }

  // Case 3 — plain conversational answer
  return `<div style="font-size:14px;color:#202124;line-height:1.7">${lines.join('<br>')}</div>`;
}

function inferColumnLabels(rows, maxCols) {
  const flat = rows.flat().join(' ').toLowerCase();
  if (flat.includes('mg') || flat.includes('tablet') || flat.includes('daily')) {
    return ['Medicine & dose', 'Frequency', 'Doctor', 'Condition', 'Notes'].slice(0, maxCols);
  }
  if (flat.includes('dr.') && (flat.includes('clinic') || flat.includes('visit') || flat.includes('apollo'))) {
    return ['Date', 'Doctor', 'Clinic', 'Reason', 'Follow-up'].slice(0, maxCols);
  }
  if (flat.includes('%') || flat.includes('hba1c') || flat.includes('normal') || flat.includes('high') || flat.includes('low')) {
    return ['Test', 'Date', 'Result', 'Status', 'Lab'].slice(0, maxCols);
  }
  return Array.from({length: maxCols}, (_, i) => ['Details', 'Value', 'Info', 'Notes', 'Status'][i] || 'Field');
}

  function setPerson(p, btn) {
    person = p;
    document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    document.getElementById('chat').appendChild(div);
    div.scrollIntoView();
  }
  async function ask(q) {
    document.getElementById('inp').value = q;
    await sendMsg();
  }
  async function sendMsg() {
    const inp = document.getElementById('inp');
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    addMsg('user', q);
    addMsg('agent', 'Thinking...');
    try {
      const r = await fetch(AGENT_URL, {
        method: 'POST',
        body: JSON.stringify({ question: q, person })
      });
      const data = await r.json();
      document.querySelectorAll('.agent:last-child')[0].textContent = data.answer;
    } catch(e) {
      document.querySelectorAll('.agent:last-child')[0].textContent = 'Error connecting. Check your setup.';
    }
  }
</script>
</body>
</html>
